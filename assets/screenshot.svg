  <text x="150" y="58" font-family="sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle" font-weight="600">Project</text>
  <text x="150" y="72" font-family="sans-serif" font-size="8" fill="#475569" text-anchor="middle">Name &amp; describe</text>
  <!-- Connector 1-2 (filled) -->
  <rect x="180" y="30" width="140" height="4" rx="2" fill="rgba(52,211,153,0.3)"/>
  <rect x="180" y="30" width="140" height="4" rx="2" fill="#34d399"/>
  <!-- Step 2: Active -->
  <circle cx="350" cy="32" r="18" fill="rgba(129,140,248,0.15)" stroke="#818cf8" stroke-width="2"/>
  <text x="350" y="37" font-family="sans-serif" font-size="14" fill="#818cf8" text-anchor="middle">◉</text>
  <text x="350" y="58" font-family="sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle" font-weight="600">Team</text>
  <text x="350" y="72" font-family="sans-serif" font-size="8" fill="#475569" text-anchor="middle">Add collaborators</text>
  <!-- Connector 2-3 (partial) -->
  <rect x="380" y="30" width="140" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="380" y="30" width="40" height="4" rx="2" fill="rgba(129,140,248,0.3)"/>
  <!-- Step 3: Upcoming -->
  <circle cx="550" cy="32" r="18" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <text x="550" y="37" font-family="sans-serif" font-size="14" fill="#475569" text-anchor="middle">◇</text>
  <text x="550" y="58" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" font-weight="600">Settings</text>
  <text x="550" y="72" font-family="sans-serif" font-size="8" fill="#475569" text-anchor="middle">Config options</text>
  <!-- Connector 3-4 -->
  <rect x="580" y="30" width="140" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
  <!-- Step 4: Review -->
  <circle cx="750" cy="32" r="18" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <text x="750" y="37" font-family="sans-serif" font-size="14" fill="#475569" text-anchor="middle">◆</text>
  <text x="750" y="58" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" font-weight="600">Review</text>
  <text x="750" y="72" font-family="sans-serif" font-size="8" fill="#475569" text-anchor="middle">Confirm &amp; launch</text>
  <!-- Active step content area -->
  <rect x="100" y="96" width="700" height="280" rx="14" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)"/>
  <!-- Step header -->
  <text x="140" y="130" font-family="sans-serif" font-size="20" fill="#e2e8f0" font-weight="700">◉ Team</text>
  <text x="140" y="148" font-family="sans-serif" font-size="11" fill="#94a3b8">Add collaborators</text>
  <text x="660" y="134" font-family="sans-serif" font-size="10" fill="#475569">Step 2 of 4</text>
  <line x1="130" y1="160" x2="770" y2="160" stroke="rgba(255,255,255,0.06)"/>
  <!-- Field 1: Owner email -->
  <text x="140" y="186" font-family="sans-serif" font-size="11" fill="#e2e8f0" font-weight="600">Owner email</text>
  <text x="222" y="186" font-family="sans-serif" font-size="8" fill="#ef4444">required</text>
  <rect x="140" y="194" width="620" height="36" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(129,140,248,0.3)"/>
  <text x="156" y="216" font-family="sans-serif" font-size="12" fill="#e2e8f0">alex@company.com</text>
  <!-- Field 2: Team size -->
  <text x="140" y="254" font-family="sans-serif" font-size="11" fill="#e2e8f0" font-weight="600">Team size</text>
  <text x="204" y="254" font-family="sans-serif" font-size="8" fill="#ef4444">required</text>
  <rect x="140" y="262" width="620" height="36" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
  <text x="156" y="284" font-family="sans-serif" font-size="12" fill="#94a3b8">Select an option…</text>
  <text x="740" y="284" font-family="sans-serif" font-size="10" fill="#475569">▾</text>
  <!-- Navigation buttons -->
  <rect x="140" y="320" width="80" height="34" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
  <text x="180" y="341" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">← Back</text>
  <rect x="680" y="320" width="80" height="34" rx="8" fill="rgba(129,140,248,0.15)" stroke="rgba(129,140,248,0.4)"/>
  <text x="720" y="341" font-family="sans-serif" font-size="11" fill="#818cf8" text-anchor="middle">Next →</text>
  <!-- Dot navigation -->
  <circle cx="420" cy="368" r="4" fill="#34d399"/>
  <circle cx="435" cy="368" r="4" fill="#818cf8"/>
  <circle cx="450" cy="368" r="4" fill="rgba(255,255,255,0.1)"/>
  <circle cx="465" cy="368" r="4" fill="rgba(255,255,255,0.1)"/>
  <!-- Footer hint -->
  <text x="450" y="430" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.15)" text-anchor="middle">Validated fields · Animated progress · Click completed steps to jump back · Auto-generated review step</text>
</svg>

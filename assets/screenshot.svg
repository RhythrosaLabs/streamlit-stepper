<svg xmlns="http://www.w3.org/2000/svg" width="900" height="440" viewBox="0 0 900 440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0e0e1c"/><stop offset="100%" stop-color="#08080f"/></linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="440" rx="14" fill="url(#bg)" stroke="rgba(255,255,255,0.06)"/>
  <!-- Step indicator bar -->
  <rect x="0" y="0" width="900" height="80" rx="14" fill="#0e0e1c"/>
  <rect x="0" y="14" width="900" height="66" fill="#0e0e1c"/>
  <line x1="0" y1="80" x2="900" y2="80" stroke="rgba(255,255,255,0.06)"/>
  <!-- Step 1: Completed -->
  <circle cx="150" cy="32" r="18" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="2"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="900" height="580">
  <!-- Background (warm off-white) -->
  <rect width="900" height="580" rx="12" fill="#f7f6f2"/>

  <!-- Top bar (white) -->
  <rect x="0" y="0" width="900" height="52" rx="12" fill="#ffffff"/>
  <rect x="0" y="40" width="900" height="12" fill="#ffffff"/>
  <line x1="0" y1="52" x2="900" y2="52" stroke="#e2e0da"/>
  <text x="32" y="33" font-family="Georgia, serif" font-size="17" fill="#0f0e0c" font-weight="bold">New Project</text>
  <rect x="170" y="18" width="42" height="22" rx="4" fill="#f7f6f2"/>
  <text x="191" y="33" font-family="monospace" font-size="11" fill="#c8c6c0" text-anchor="middle">2 / 4</text>
  <!-- Orientation toggle -->
  <rect x="730" y="16" width="150" height="26" rx="6" fill="#f7f6f2" stroke="#e2e0da"/>
  <rect x="730" y="16" width="78" height="26" rx="6" fill="#0f0e0c"/>
  <text x="769" y="33" font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">HORIZONTAL</text>
  <text x="845" y="33" font-family="monospace" font-size="10" fill="#8a8880" text-anchor="middle">VERTICAL</text>

  <!-- Step indicator bar -->
  <rect x="0" y="52" width="900" height="100" fill="#ffffff"/>
  <line x1="0" y1="152" x2="900" y2="152" stroke="#e2e0da"/>

  <!-- Step 1: Done (green checkmark) -->
  <circle cx="140" cy="88" r="20" fill="#2a7a4f" stroke="#2a7a4f" stroke-width="2"/>
  <polyline points="131,88 137,94 149,82" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="140" y="122" font-family="Georgia, serif" font-size="14" fill="#0f0e0c" text-anchor="middle">Project</text>
  <text x="140" y="137" font-family="sans-serif" font-size="11" fill="#8a8880" text-anchor="middle">Name &amp; describe</text>

  <!-- Connector 1→2 (filled green) -->
  <rect x="162" y="87" width="116" height="2" fill="#2a7a4f"/>

  <!-- Step 2: Active (black filled, number 02) -->
  <circle cx="300" cy="88" r="20" fill="#0f0e0c" stroke="#0f0e0c" stroke-width="2"/>
  <circle cx="300" cy="88" r="23" fill="none" stroke="rgba(15,14,12,0.15)" stroke-width="1.5"/>
  <text x="300" y="93" font-family="monospace" font-size="13" fill="white" text-anchor="middle">02</text>
  <text x="300" y="122" font-family="Georgia, serif" font-size="15" fill="#0f0e0c" text-anchor="middle" font-weight="bold">Team</text>
  <text x="300" y="137" font-family="sans-serif" font-size="11" fill="#8a8880" text-anchor="middle">Add collaborators</text>

  <!-- Connector 2→3 (unfilled) -->
  <rect x="322" y="87" width="116" height="2" fill="#e2e0da"/>

  <!-- Step 3: Pending -->
  <circle cx="460" cy="88" r="20" fill="#ffffff" stroke="#e2e0da" stroke-width="2"/>
  <text x="460" y="93" font-family="monospace" font-size="13" fill="#c8c6c0" text-anchor="middle">03</text>
  <text x="460" y="122" font-family="Georgia, serif" font-size="14" fill="#c8c6c0" text-anchor="middle">Stack</text>
  <text x="460" y="137" font-family="sans-serif" font-size="11" fill="#c8c6c0" text-anchor="middle">Tech choices</text>

  <!-- Connector 3→4 (unfilled) -->
  <rect x="482" y="87" width="116" height="2" fill="#e2e0da"/>

  <!-- Step 4: Pending -->
  <circle cx="620" cy="88" r="20" fill="#ffffff" stroke="#e2e0da" stroke-width="2"/>
  <text x="620" y="93" font-family="monospace" font-size="13" fill="#c8c6c0" text-anchor="middle">04</text>
  <text x="620" y="122" font-family="Georgia, serif" font-size="14" fill="#c8c6c0" text-anchor="middle">Review</text>
  <text x="620" y="137" font-family="sans-serif" font-size="11" fill="#c8c6c0" text-anchor="middle">Confirm &amp; launch</text>

  <!-- Step content area -->
  <!-- Step icon + title -->
  <text x="170" y="192" font-family="monospace" font-size="18" fill="#c8c6c0">◉</text>
  <text x="196" y="192" font-family="Georgia, serif" font-size="26" fill="#0f0e0c" font-weight="bold">Team</text>

  <!-- Form card (white, rounded, bordered) -->
  <rect x="170" y="210" width="560" height="260" rx="14" fill="#ffffff" stroke="#e2e0da"/>

  <!-- Field 1: Owner email -->
  <text x="198" y="248" font-family="sans-serif" font-size="12" fill="#8a8880" font-weight="500">OWNER EMAIL</text>
  <circle cx="278" cy="243" r="3" fill="#c8552a"/>
  <rect x="198" y="256" width="504" height="40" rx="8" fill="#f7f6f2" stroke="#e2e0da" stroke-width="1.5"/>
  <text x="212" y="281" font-family="sans-serif" font-size="14" fill="#0f0e0c">dan@company.com</text>

  <!-- Field 2: Team size -->
  <text x="198" y="326" font-family="sans-serif" font-size="12" fill="#8a8880" font-weight="500">TEAM SIZE</text>
  <circle cx="260" cy="321" r="3" fill="#c8552a"/>
  <rect x="198" y="334" width="504" height="40" rx="8" fill="#f7f6f2" stroke="#e2e0da" stroke-width="1.5"/>
  <text x="212" y="359" font-family="sans-serif" font-size="14" fill="#0f0e0c">2–5</text>
  <!-- Select dropdown arrow -->
  <polygon points="678,352 686,352 682,358" fill="#8a8880"/>

  <!-- Field 3: Notes (textarea) -->
  <text x="198" y="404" font-family="sans-serif" font-size="12" fill="#8a8880" font-weight="500">NOTES</text>
  <rect x="198" y="412" width="504" height="40" rx="8" fill="#f7f6f2" stroke="#e2e0da" stroke-width="1.5"/>
  <text x="212" y="437" font-family="sans-serif" font-size="14" fill="#c8c6c0">Optional team notes…</text>

  <!-- Navigation footer -->
  <!-- Back button -->
  <rect x="170" y="492" width="90" height="40" rx="8" fill="none" stroke="#e2e0da"/>
  <text x="215" y="517" font-family="sans-serif" font-size="13" fill="#0f0e0c" text-anchor="middle">← Back</text>

  <!-- Dot indicators (center) -->
  <rect x="390" y="508" width="6" height="6" rx="3" fill="#2a7a4f"/>
  <rect x="402" y="506" width="20" height="6" rx="3" fill="#0f0e0c"/>
  <rect x="428" y="508" width="6" height="6" rx="3" fill="#e2e0da"/>
  <rect x="440" y="508" width="6" height="6" rx="3" fill="#e2e0da"/>

  <!-- Continue button -->
  <rect x="600" y="492" width="130" height="40" rx="8" fill="#0f0e0c"/>
  <text x="665" y="517" font-family="sans-serif" font-size="13" fill="white" text-anchor="middle">Continue →</text>
</svg>